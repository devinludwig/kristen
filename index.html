  <script>
    // Update the meta block to reflect the currently active carousel image.
    (function () {
      function updateMetaFromActive() {
        var $active = $('#carouselPaintings .carousel-item.active');
        if ($active.length === 0) {
          $active = $('#carouselPaintings .carousel-item').first();
        }
        var $img = $active.find('img').first();

        var title = $img.attr('data-title');
        var date = $img.attr('data-date');
        var medium = $img.attr('data-medium');
        var dimensions = $img.attr('data-dimensions');

        // Line 1: title, date (show only if at least one exists)
        var line1 = '';
        var parts = [];
        if (title) parts.push(title);
        if (date) parts.push(date);
        if (parts.length > 0) line1 = parts.join(', ');

        // Line 2: medium (show only if provided)
        var line2 = medium || '';

        // Line 3: dimensions (show only if provided)
        var line3 = dimensions || '';

        var el1 = document.getElementById('meta-line1');
        var el2 = document.getElementById('meta-line2');
        var el3 = document.getElementById('meta-line3');

        if (line1) { el1.textContent = line1; el1.style.display = ''; } else { el1.textContent = ''; el1.style.display = 'none'; }
        if (line2) { el2.textContent = line2; el2.style.display = ''; } else { el2.textContent = ''; el2.style.display = 'none'; }
        if (line3) { el3.textContent = line3; el3.style.display = ''; } else { el3.textContent = ''; el3.style.display = 'none'; }
      }

      // Initialize on DOM ready and on carousel change
      $(document).ready(function () {
        updateMetaFromActive();
        $('#carouselPaintings').on('slid.bs.carousel', function () {
          updateMetaFromActive();
        });
        // Allow left/right arrow keys to navigate the carousel
        $(document).keydown(function (e) {
          // don't intercept typing in inputs, textareas, or contenteditable elements
          var tag = e.target.tagName.toLowerCase();
          var isEditable = $(e.target).is('input, textarea, [contenteditable]');
          if (isEditable) return;
          var key = e.which || e.keyCode;
          if (key === 37) { // left arrow
            $('#carouselPaintings').carousel('prev');
            e.preventDefault();
          } else if (key === 39) { // right arrow
            $('#carouselPaintings').carousel('next');
            e.preventDefault();
          }
        });
      });
    })();
